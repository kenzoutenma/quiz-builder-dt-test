version: "3.9"

services:
  qz-back:
    image: qz-back:latest
    container_name: qz-back
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=${PORT}
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./:/db/
  qz-front:
    image: qz-front:latest
    container_name: qz-front
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${DATABASE_URL}
    build:
      context: ./frontend
      dockerfile: dockerfile
    ports:
      - "3000:3000"
